<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS - Sistema de Inteligência Artificial</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>

<div class="hud-container">

    <div class="grid-background"></div>

    <!-- CENTRO -->
    <div class="hud-panel center">

        <div class="hologram-container">
            <img src="hologram.gif" class="hologram-gif">
            <div class="jarvis-label">
                <h1>JARVIS</h1>
                <div class="label-line"></div>
            </div>
        </div>

        <div class="voice-controls">
            <button class="voice-button" id="voiceButton">
                🎤
            </button>

            <div class="voice-status" id="voiceStatus">
                <div class="status-text">SISTEMA ATIVO</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message jarvis-message">
                <div class="message-content">
                    <p>JARVIS ONLINE.</p>
                    <span class="message-time">INICIADO</span>
                </div>
            </div>
        </div>

    </div>

</div>
